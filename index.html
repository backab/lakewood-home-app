<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>7015 Home Dashboard</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body class="min-h-screen bg-[#F4F1EA] text-[#5A4C40] font-sans pb-24 m-0 no-scrollbar">
  
  <header class="pt-14 pb-4 px-6 flex justify-between items-center">
    <div>
      <p class="text-xs font-bold tracking-widest text-[#9A8C7E] uppercase mb-1">Welcome Home</p>
      <h1 class="text-2xl font-bold tracking-wide text-[#3E342B]">7015 Phillips Rd</h1>
    </div>
    <div class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center cursor-pointer hover:bg-[#EAE4D9] transition">
       <span class="text-lg text-[#5A4C40]">⚙️</span>
    </div>
  </header>

<main class="px-6 space-y-8 pt-2">
  
  <div id="view-home" class="block space-y-6">
    <div class="rounded-[32px] overflow-hidden relative h-64 shadow-md bg-white p-2">
      <img src="https://images.unsplash.com/photo-1513836279014-a89f7a76ae86?q=80&w=800&auto=format&fit=crop" alt="Earthy Nature" class="w-full h-full object-cover rounded-[24px]" />
      <div class="absolute inset-0 bg-gradient-to-t from-[#3E342B]/80 via-transparent to-transparent rounded-[32px]"></div>
      <div class="absolute bottom-6 left-6 right-6 flex justify-between items-end">
        <div>
          <h2 class="text-white text-lg font-medium tracking-wide">System Status</h2>
          <p class="text-white/80 text-sm mt-1 status-pulse">All systems running</p>
        </div>
        <div class="bg-white/20 backdrop-blur-md rounded-full px-3 py-1 border border-white/30 text-white text-xs font-semibold">Good</div>
      </div>
    </div>

    <div>
      <div class="flex justify-between items-center mb-4 px-1">
        <h3 class="text-lg font-bold text-[#3E342B]">Home Systems</h3>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <button class="bg-white shadow-[0_4px_20px_rgb(0,0,0,0.03)] rounded-[24px] p-5 flex flex-col items-start gap-4 transition hover:-translate-y-1">
          <div class="w-12 h-12 rounded-full bg-[#E5F0ED] flex items-center justify-center text-xl">💧</div>
          <div class="text-left">
            <span class="block font-bold text-[#3E342B]">Well Water</span>
            <span class="block text-xs text-[#9A8C7E] mt-1">Check filter</span>
          </div>
        </button>
        <button class="bg-white shadow-[0_4px_20px_rgb(0,0,0,0.03)] rounded-[24px] p-5 flex flex-col items-start gap-4 transition hover:-translate-y-1">
          <div class="w-12 h-12 rounded-full bg-[#F4EBE6] flex items-center justify-center text-xl">♨️</div>
          <div class="text-left">
            <span class="block font-bold text-[#3E342B]">Hot Tub</span>
            <span class="block text-xs text-[#9A8C7E] mt-1">102°F target</span>
          </div>
        </button>
        <button class="bg-white shadow-[0_4px_20px_rgb(0,0,0,0.03)] rounded-[24px] p-5 flex flex-col items-start gap-4 transition hover:-translate-y-1">
          <div class="w-12 h-12 rounded-full bg-[#E8EDDF] flex items-center justify-center text-xl">🌱</div>
          <div class="text-left">
            <span class="block font-bold text-[#3E342B]">Septic Drip</span>
            <span class="block text-xs text-[#9A8C7E] mt-1">Auto-cycle</span>
          </div>
        </button>
        <button class="bg-white shadow-[0_4px_20px_rgb(0,0,0,0.03)] rounded-[24px] p-5 flex flex-col items-start gap-4 transition hover:-translate-y-1">
          <div class="w-12 h-12 rounded-full bg-[#F3EBE1] flex items-center justify-center text-xl">📅</div>
          <div class="text-left">
            <span class="block font-bold text-[#3E342B]">Calendar</span>
            <span class="block text-xs text-[#9A8C7E] mt-1">2 upcoming</span>
          </div>
        </button>
      </div>
    </div>
  </div>

  <div id="view-tasks" class="hidden">
    <h2 class="text-2xl font-bold text-[#3E342B] mb-6">Maintenance Tasks</h2>
    <div class="bg-white shadow-[0_4px_20px_rgb(0,0,0,0.03)] rounded-[24px] p-6">
      <p class="text-[#9A8C7E] text-sm">Your task list will go here!</p>
    </div>
  </div>

  <div id="view-calendar" class="hidden space-y-6 relative pb-16">
    <div class="bg-white shadow-[0_4px_20px_rgb(0,0,0,0.03)] rounded-[32px] p-5">
      <div class="flex justify-between items-center mb-4 px-2">
        <button id="prev-month" class="text-[#9A8C7E] hover:text-[#5A4C40] p-1">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <h2 id="calendar-month-year" class="text-lg font-bold text-[#3E342B]"></h2>
        <button id="next-month" class="text-[#9A8C7E] hover:text-[#5A4C40] p-1">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
        </button>
      </div>

      <div class="grid grid-cols-7 text-center text-xs font-bold text-[#9A8C7E] mb-2">
        <div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div>
      </div>

      <div id="calendar-grid" class="grid grid-cols-7 text-center gap-y-2 text-[#3E342B] font-medium text-sm">
        </div>
    </div>

    <div>
      <h3 class="text-lg font-bold text-[#3E342B] mb-4 px-1">Upcoming plans</h3>
      <div class="space-y-3">
        <div class="bg-white shadow-[0_4px_20px_rgb(0,0,0,0.03)] rounded-[20px] p-4 flex gap-4 items-center border-l-4 border-[#5A4C40]">
          <div class="w-12 h-12 rounded-[14px] bg-[#E8EDDF] flex items-center justify-center text-xl shrink-0">💧</div>
          <div class="flex-1">
            <h4 class="font-bold text-[#3E342B] text-sm">Check Sediment Filter</h4>
            <p class="text-xs text-[#9A8C7E] mt-0.5">Tomorrow • 10:00 AM</p>
          </div>
        </div>
      </div>
    </div>

    <button id="btn-add-task" class="fixed bottom-24 right-6 w-14 h-14 bg-[#5A4C40] text-white rounded-full shadow-lg flex items-center justify-center hover:bg-[#3E342B] transition z-50">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
    </button>
  </div>

  <div id="view-profile" class="hidden">
    <h2 class="text-2xl font-bold text-[#3E342B] mb-6">Settings & Logs</h2>
    <div class="bg-white shadow-[0_4px_20px_rgb(0,0,0,0.03)] rounded-[24px] p-6">
      <p class="text-[#9A8C7E] text-sm">App settings will go here!</p>
    </div>
  </div>

</main>

<nav class="fixed bottom-0 w-full bg-[#F4F1EA] border-t border-[#EAE4D9] pt-4 pb-8 z-50">
  <div class="flex justify-around items-center">
    <button id="btn-home" class="flex flex-col items-center gap-1 text-[#5A4C40] transition">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
    </button>
    <button id="btn-tasks" class="flex flex-col items-center gap-1 text-[#BBAEA0] hover:text-[#5A4C40] transition">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg>
    </button>
    <button id="btn-calendar" class="flex flex-col items-center gap-1 text-[#BBAEA0] hover:text-[#5A4C40] transition">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
    </button>
    <button id="btn-profile" class="flex flex-col items-center gap-1 text-[#BBAEA0] hover:text-[#5A4C40] transition">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
    </button>
  </div>
</nav>

<script src="app.js"></script>
  <div>
          <label class="block text-xs font-bold text-[#9A8C7E] uppercase mb-1">Home System</label>
          <div class="relative">
            <select id="task-system" class="w-full bg-[#F4F1EA] text-[#3E342B] rounded-2xl p-3 border-none focus:ring-2 focus:ring-[#5A4C40] outline-none font-medium appearance-none pr-10" required>
              <option value="General">General Home</option>
              <option value="Well Water">Well Water</option>
              <option value="Hot Tub">Hot Tub</option>
              <option value="Septic Drip">Septic Drip</option>
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-[#9A8C7E]">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
            </div>
          </div>
        </div>
        <div id="day-view-modal" class="fixed inset-0 bg-[#3E342B]/40 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-4 transition-opacity">
    <div class="bg-white rounded-[32px] p-6 w-full max-w-sm shadow-2xl relative">
      <h2 id="day-view-title" class="text-xl font-bold text-[#3E342B] mb-5">Tasks</h2>
      
      <div id="day-view-tasks" class="space-y-3 mb-6 max-h-60 overflow-y-auto no-scrollbar">
        </div>
      
      <div class="flex gap-3 pt-2">
        <button type="button" id="btn-close-day-view" class="flex-1 py-3.5 rounded-2xl font-bold text-[#9A8C7E] bg-[#F4F1EA] hover:bg-[#EAE4D9] transition">Close</button>
        <button type="button" id="btn-open-add-task" class="flex-1 py-3.5 rounded-2xl font-bold text-white bg-[#5A4C40] hover:bg-[#3E342B] transition shadow-lg">+ Add Task</button>
      </div>
    </div>
  </div>
        <div>
          <label class="block text-xs font-bold text-[#9A8C7E] uppercase mb-1">Task Name</label>
          <input type="text" id="task-title" placeholder="e.g., Change sediment filter" class="w-full bg-[#F4F1EA] text-[#3E342B] rounded-2xl p-3 border-none focus:ring-2 focus:ring-[#5A4C40] outline-none font-medium" required>
        </div>
        
        <div class="flex gap-3 pt-2">
          <button type="button" id="btn-cancel-task" class="flex-1 py-3.5 rounded-2xl font-bold text-[#9A8C7E] bg-[#F4F1EA] hover:bg-[#EAE4D9] transition">Cancel</button>
          <button type="submit" class="flex-1 py-3.5 rounded-2xl font-bold text-white bg-[#5A4C40] hover:bg-[#3E342B] transition shadow-lg">Save Task</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
