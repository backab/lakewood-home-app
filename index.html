<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>7015 Home Dashboard</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
</head>

<body class="min-h-screen bg-gradient-to-b from-blue-500 to-slate-900 text-white font-sans pb-24 m-0 no-scrollbar">
  
  <header class="pt-14 pb-6 px-6 flex justify-between items-center">
    <h1 class="text-2xl font-light tracking-wide">Good Morning!</h1>
    <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center border border-white/10 cursor-pointer hover:bg-white/30 transition">
       <span class="text-lg">⚙️</span>
    </div>
  </header>

  <main class="px-6 space-y-8 pt-4">
    
    <div id="view-home" class="block space-y-8">
      <div class="rounded-3xl overflow-hidden relative h-56 shadow-2xl border border-white/10">
        <img src="https://images.unsplash.com/photo-1433086966358-54859d0ed716?q=80&w=800&auto=format&fit=crop" alt="Nature Creek" class="w-full h-full object-cover" />
        <div class="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-slate-900/20 to-transparent"></div>
        <div class="absolute bottom-5 left-5">
          <h2 class="text-xl font-medium tracking-wide">7015 Phillips Rd SW</h2>
          <p class="text-sm text-gray-300 mt-1 status-pulse">All systems operating normally</p>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <button class="bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/10 rounded-full py-3 px-4 flex items-center gap-3 transition shadow-lg w-full text-left">
          <span class="text-xl">💧</span> <span class="font-medium text-sm">Well Water</span>
        </button>
        <button class="bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/10 rounded-full py-3 px-4 flex items-center gap-3 transition shadow-lg w-full text-left">
          <span class="text-xl">♨️</span> <span class="font-medium text-sm">Hot Tub</span>
        </button>
        <button class="bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/10 rounded-full py-3 px-4 flex items-center gap-3 transition shadow-lg w-full text-left">
          <span class="text-xl">🌱</span> <span class="font-medium text-sm">Septic Drip</span>
        </button>
        <button class="bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/10 rounded-full py-3 px-4 flex items-center gap-3 transition shadow-lg w-full text-left">
          <span class="text-xl">📅</span> <span class="font-medium text-sm">Calendar</span>
        </button>
      </div>
    </div>

    <div id="view-tasks" class="hidden">
      <h2 class="text-xl font-medium mb-4">Monthly Maintenance</h2>
      <div class="bg-white/10 backdrop-blur-md border border-white/10 rounded-2xl p-5">
        <p class="text-gray-300 text-sm">Your task list will go here!</p>
      </div>
    </div>

    <div id="view-profile" class="hidden">
      <h2 class="text-xl font-medium mb-4">Settings & Logs</h2>
      <div class="bg-white/10 backdrop-blur-md border border-white/10 rounded-2xl p-5">
        <p class="text-gray-300 text-sm">App settings will go here!</p>
      </div>
    </div>

  </main>

  <nav class="fixed bottom-0 w-full bg-slate-900/80 backdrop-blur-lg border-t border-white/10 pt-3 pb-8">
    <div class="flex justify-around items-center">
      <button id="btn-home" class="flex flex-col items-center gap-1 text-white transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
        <span class="text-[10px] uppercase tracking-wider font-medium mt-1">Home</span>
      </button>
      <button id="btn-tasks" class="flex flex-col items-center gap-1 text-gray-400 hover:text-white transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg>
        <span class="text-[10px] uppercase tracking-wider font-medium mt-1">Tasks</span>
      </button>
      <button id="btn-profile" class="flex flex-col items-center gap-1 text-gray-400 hover:text-white transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
        <span class="text-[10px] uppercase tracking-wider font-medium mt-1">Profile</span>
      </button>
    </div>
  </nav>

  <script src="app.js"></script>
</body>
</html>

 <script src="app.js"></script>
</body>
</html>
