<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>7015 Home Dashboard</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="stylesheet" href="style.css">
</head>

<body class="min-h-screen bg-[#F4F1EA] text-[#5A4C40] font-sans pb-24 m-0 no-scrollbar">
  
  <header class="pt-14 pb-4 px-6 flex justify-between items-center">
    <div>
      <p class="text-xs font-bold tracking-widest text-[#9A8C7E] uppercase mb-1">Welcome Home</p>
      <h1 class="text-2xl font-bold tracking-wide text-[#3E342B]">7015 Phillips Rd</h1>
    </div>
    <div class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center cursor-pointer hover:bg-[#EAE4D9] transition">
       <span class="text-lg text-[#5A4C40]">⚙️</span>
    </div>
  </header>

<main class="px-6 space-y-8 pt-2">
  
  <div id="view-calendar" class="hidden space-y-6 relative pb-16">
    
    <div class="bg-white shadow-[0_4px_20px_rgb(0,0,0,0.03)] rounded-[32px] p-5">
      <div class="flex justify-between items-center mb-4 px-2">
        <button id="prev-month" class="text-[#9A8C7E] p-1">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2"/></svg>
        </button>
        <h2 id="calendar-month-year" class="text-lg font-bold text-[#3E342B]"></h2>
        <button id="next-month" class="text-[#9A8C7E] p-1">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2"/></svg>
        </button>
      </div>

      <div class="grid grid-cols-7 text-center text-xs font-bold text-[#9A8C7E] mb-2">
        <div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div>
      </div>

      <div id="calendar-grid" class="grid grid-cols-7 text-center gap-y-2 text-[#3E342B] font-medium text-sm">
        </div>
    </div>

    <div>
      <h3 class="text-lg font-bold text-[#3E342B] mb-4 px-1">Upcoming plans</h3>
      <div class="space-y-3">
        <div class="bg-white shadow-[0_4px_20px_rgb(0,0,0,0.03)] rounded-[20px] p-4 flex gap-4 items-center border-l-4 border-[#5A4C40]">
          <div class="w-12 h-12 rounded-[14px] bg-[#E8EDDF] flex items-center justify-center text-xl shrink-0">💧</div>
          <div class="flex-1">
            <h4 class="font-bold text-[#3E342B] text-sm">Well Filter Check</h4>
            <p class="text-xs text-[#9A8C7E]">Tomorrow • 10:00 AM</p>
          </div>
        </div>
      </div>
    </div>

    <button class="fixed bottom-24 right-6 w-14 h-14 bg-[#5A4C40] text-white rounded-full shadow-lg flex items-center justify-center z-50">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2"/></svg>
    </button>
  </div>
</main>

 <nav class="fixed bottom-0 w-full bg-[#F4F1EA] border-t border-[#EAE4D9] pt-4 pb-8 z-50">
  <div class="flex justify-around items-center">
    <button id="btn-home" class="text-[#5A4C40] transition">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    </button>
    
    <button id="btn-tasks" class="text-[#BBAEA0] transition">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
    </button>

    <button id="btn-calendar" class="text-[#BBAEA0] transition">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
    </button>

    <button id="btn-profile" class="text-[#BBAEA0] transition">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
    </button>
  </div>
</nav>

  <script src="app.js"></script>
</body>
</html>
